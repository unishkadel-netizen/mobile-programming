<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #f2f4f7;
    margin: 0;
    padding: 20px;
}

.container{
    width: 700px;
    max-width: 95%;
    margin: auto;
}

.card{
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    margin-bottom: 25px;
}

h1,h2{
    text-align: center;
    color: #333;
}

input, textarea{
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

textarea{
    resize: vertical;
}

button{
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover{
    background: #0056b3;
}

#result{
    margin-top: 20px;
}

.user-card{
    background: #f8f9fa;
    border-left: 5px solid #007bff;
    padding: 15px;
    border-radius: 8px;
}

.user-card p{
    margin: 8px 0;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Contact Us Form</h1>

        <form id="contactForm">

            <input type="number" id="userNumber" placeholder="User Number" required>

            <input type="text" id="fullname" placeholder="Full Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <input type="text" id="phone" placeholder="Phone Number" required>

            <input type="text" id="address" placeholder="Address" required>

            <input type="text" id="city" placeholder="City" required>

            <input type="text" id="country" placeholder="Country" required>

            <input type="text" id="subject" placeholder="Subject" required>

            <textarea id="message" rows="5" placeholder="Message" required></textarea>

            <button type="submit">Save User</button>

        </form>

    </div>


    <div class="card">

        <h2>Read User By Number</h2>

        <input type="number" id="searchNumber" placeholder="Enter User Number">

        <button id="searchBtn">Search User</button>

        <div id="result"></div>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
